spring:
  datasource:
    url: ${CART_DB_URL}
    username: ${CART_DB_USER}
    password: ${CART_DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT_CART}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}


springdoc:
  api-docs:
    enabled: ${ENABLE_SWAGGER:false}
